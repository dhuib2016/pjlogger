log4cplus.rootLogger=DEBUG, A1

log4cplus.appender.A1=log4cplus::RollingFileAppender
log4cplus.appender.A1.File=./logs/logfile.log
log4cplus.appender.A1.MaxFileSize=10MB
log4cplus.appender.A1.MaxBackupIndex=3
log4cplus.appender.A1.layout=log4cplus::PatternLayout
log4cplus.appender.A1.layout.ConversionPattern=%D{%Y-%m-%d %H:%M:%S.%q} %-5p %c{2} - %m%n
log4cplus.appender.A1.Append=true
log4cplus.tz=Asia/Shanghai.
