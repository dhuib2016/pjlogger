#log4cplus.rootLogger=DEBUG, FILE
log4cplus.rootLogger=DEBUG, ROOT_APP

log4cplus.appender.ROOT_APP=log4cplus::RollingFileAppender
log4cplus.appender.ROOT_APP.File=./logs/all.log
log4cplus.appender.ROOT_APP.MaxFileSize=10MB
log4cplus.appender.ROOT_APP.MaxBackupIndex=5
log4cplus.appender.ROOT_APP.layout=log4cplus::PatternLayout
log4cplus.appender.ROOT_APP.layout.ConversionPattern=%D{%Y-%m-%d %H:%M:%S} [%t] [%x] %-5p %c - %m%n

