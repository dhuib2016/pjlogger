# mainlog 单独文件
log4cplus.logger.mainlog=DEBUG, MAIN_FILE
log4cplus.additivity.mainlog=false
log4cplus.appender.MAIN_FILE=log4cplus::RollingFileAppender
log4cplus.appender.MAIN_FILE.File=${LOG_DIR}/${LOG_NAME}.log
log4cplus.appender.MAIN_FILE.MaxFileSize=10MB
log4cplus.appender.MAIN_FILE.MaxBackupIndex=5
log4cplus.appender.MAIN_FILE.layout=log4cplus::PatternLayout
log4cplus.appender.MAIN_FILE.layout.ConversionPattern=%D{%Y-%m-%d %H:%M:%S} [%t] [%x] %-5p %c - %m%n

log4cplus.appender.FILE.layout=log4cplus::PatternLayout
log4cplus.appender.FILE.layout.ConversionPattern=%D{%Y-%m-%d %H:%M:%S} [%t] [%x] %-5p %c - %m%n
