# branch 单独文件
log4cplus.logger.branch=DEBUG, BRANCH_FILE
log4cplus.additivity.branch=false
log4cplus.appender.BRANCH_FILE=log4cplus::RollingFileAppender
log4cplus.appender.BRANCH_FILE.File=./logs/branch.log
log4cplus.appender.BRANCH_FILE.MaxFileSize=10MB
log4cplus.appender.BRANCH_FILE.MaxBackupIndex=5
log4cplus.appender.BRANCH_FILE.layout=log4cplus::PatternLayout
log4cplus.appender.BRANCH_FILE.layout.ConversionPattern=%D{%Y-%m-%d %H:%M:%S} [%t] [%x] %-5p %c - %m%n
